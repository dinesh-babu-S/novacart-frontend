<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View product specifications, price, details, and purchase details.">
    <title>Product Details — NovaCart Vault</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style System -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>

    <!-- Header / Navbar Container -->
    <div id="header-navbar"></div>

    <!-- Main Container -->
    <div class="container" style="margin-top: 130px; min-height: 80vh;">
        
        <!-- Back to Catalog Link -->
        <div class="mb-4">
            <a href="products.html" class="nav-link-elite d-inline-flex align-items-center gap-2">
                <i class="bi bi-arrow-left"></i> Back to Catalog Collection
            </a>
        </div>
        
        <!-- Product View Card -->
        <div class="row g-5" id="product-detail-container">
            <!-- Loading states loaded dynamically -->
            <div class="col-lg-6">
                <div class="skeleton" style="height: 450px; border-radius: var(--radius-lg);"></div>
            </div>
            <div class="col-lg-6">
                <div class="skeleton mb-3" style="height: 20px; width: 30%;"></div>
                <div class="skeleton mb-3" style="height: 40px; width: 80%;"></div>
                <div class="skeleton mb-4" style="height: 30px; width: 40%;"></div>
                <div class="skeleton mb-3" style="height: 100px; width: 100%;"></div>
                <div class="skeleton" style="height: 50px; width: 50%;"></div>
            </div>
        </div>

        <!-- Related Products Section -->
        <section class="py-5 mt-5 border-top border-secondary">
            <h3 class="h2 text-white mb-4">Related Masterpieces</h3>
            <div class="row g-4" id="detail-related-products">
                <!-- Related products loaded dynamically -->
                <div class="col-6 col-md-3">
                    <div class="skeleton-card skeleton" style="height: 320px;"></div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="skeleton-card skeleton" style="height: 320px;"></div>
                </div>
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer class="py-5 mt-5" style="border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(13, 13, 24, 0.4);">
        <div class="container text-center">
            <p class="text-muted small mb-0">&copy; 2026 NovaCart Inc. Handcrafted Premium Experience.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Dynamic Background -->
    <script src="js/bg-morphism.js"></script>
    
    <!-- Custom JS Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <!-- Custom Page Script -->
    <script src="js/product-detail.js"></script>
</body>
</html>
