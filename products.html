<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse our luxury e-commerce catalog. Search, filter, and buy the finest premium items.">
    <title>Catalog — NovaCart Vault</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style System -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>

    <!-- Header / Navbar Container -->
    <div id="header-navbar"></div>

    <!-- Main Container -->
    <div class="container" style="margin-top: 120px; min-height: 80vh;">
        <div class="row">
            
            <!-- Filters Sidebar -->
            <div class="col-lg-3 mb-4">
                <div class="sidebar-filters glass-panel p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 class="h5 m-0 text-white">Filter Vault</h4>
                        <button class="btn btn-sm btn-link text-muted p-0 d-none" id="clear-filters-btn">Clear All</button>
                    </div>

                    <!-- Search Input -->
                    <div class="mb-4">
                        <label for="catalog-search" class="filter-group-title">Search Vault</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 text-secondary" style="border-color: rgba(255, 255, 255, 0.08);"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control form-control-glass border-start-0" id="catalog-search" placeholder="Type key term...">
                        </div>
                    </div>

                    <!-- Categories List -->
                    <div class="mb-4">
                        <label class="filter-group-title">Categories</label>
                        <div id="catalog-categories-list">
                            <!-- Categories dynamically rendered -->
                            <div class="skeleton" style="height: 35px; margin-bottom: 8px;"></div>
                            <div class="skeleton" style="height: 35px; margin-bottom: 8px;"></div>
                            <div class="skeleton" style="height: 35px; margin-bottom: 8px;"></div>
                        </div>
                    </div>

                    <!-- Sort Controls -->
                    <div>
                        <label for="catalog-sort" class="filter-group-title">Sort Selection</label>
                        <select class="form-select form-control-glass" id="catalog-sort">
                            <option value="id-asc" selected>Vault Default</option>
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="name-asc">Name: A to Z</option>
                            <option value="name-desc">Name: Z to A</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Products Listing -->
            <div class="col-lg-9">
                <!-- Breadcrumbs and Grid header -->
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary">
                    <div>
                        <span class="text-secondary small" id="catalog-breadcrumbs">Catalog / All Products</span>
                        <h2 class="h3 text-white mt-1 mb-0" id="catalog-title">Product Vault</h2>
                    </div>
                    <div class="text-secondary small mt-2 mt-md-0" id="catalog-item-count">
                        Loading products...
                    </div>
                </div>

                <!-- Products Grid -->
                <div class="row g-4" id="catalog-products-grid">
                    <!-- Skeletons loaded dynamically -->
                    <div class="col-6 col-md-4">
                        <div class="skeleton-card skeleton"></div>
                    </div>
                    <div class="col-6 col-md-4">
                        <div class="skeleton-card skeleton"></div>
                    </div>
                    <div class="col-6 col-md-4">
                        <div class="skeleton-card skeleton"></div>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="d-flex justify-content-center mt-5">
                    <nav aria-label="Product pagination">
                        <ul class="pagination pagination-elite" id="catalog-pagination">
                            <!-- Dynamic pagination links -->
                        </ul>
                    </nav>
                </div>

            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="py-5 mt-5" style="border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(13, 13, 24, 0.4);">
        <div class="container text-center">
            <p class="text-muted small mb-0">&copy; 2026 NovaCart Inc. Handcrafted Premium Experience.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Dynamic Background -->
    <script src="js/bg-morphism.js"></script>
    
    <!-- Custom JS Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <!-- Custom Page Script -->
    <script src="js/products.js"></script>
</body>
</html>
