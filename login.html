<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NovaCart Privilege Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style System -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            width: 100%;
            max-width: 440px;
            padding: 40px;
        }
    </style>
</head>
<body>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card glass-panel fade-in">
            <div class="text-center mb-4">
                <a href="index.html" class="navbar-brand-elite justify-content-center text-white mb-2">
                    <i class="bi bi-hexagon-fill"></i> NovaCart
                </a>
                <h2 class="h4">Privilege Portal</h2>
                <p class="text-secondary small">Access premium collections and order tracking</p>
            </div>
            
            <!-- Error Alert -->
            <div class="alert alert-danger d-none py-2" id="login-error-alert" style="background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); color: #f87171; font-size: 14px;">
                Invalid Email or Password
            </div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label-glass">Email Address</label>
                    <input type="email" class="form-control form-control-glass" id="email" required placeholder="name@example.com">
                </div>
                
                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <label for="password" class="form-label-glass m-0">Password</label>
                    </div>
                    <div class="input-group">
                        <input type="password" class="form-control form-control-glass border-end-0" id="password" required placeholder="••••••••">
                        <button class="btn btn-outline-secondary border-start-0 text-secondary" style="border-color: rgba(255, 255, 255, 0.08) !important;" type="button" id="toggle-password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="glow-btn w-100 py-3 mb-3" id="login-submit-btn">Login</button>
            </form>
            
            <div class="text-center mt-3">
                <p class="text-secondary small mb-0">New to NovaCart? <a href="register.html" class="text-gradient-purple fw-semibold">Apply for Membership</a></p>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Dynamic Background -->
    <script src="js/bg-morphism.js"></script>
    
    <!-- Custom JS Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    
    <script>
        // Password toggle visibility
        document.getElementById('toggle-password').addEventListener('click', function () {
            const pwdInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                pwdInput.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        });

        // Handle Login Submission
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('login-submit-btn');
            const errorAlert = document.getElementById('login-error-alert');
            
            errorAlert.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Authenticating...';
            
            try {
                const response = await apiRequest('/auth/login', 'POST', { email, password });
                
                if (response === 'Invalid Email or Password' || !response || response.includes(' ')) {
                    errorAlert.innerText = response || 'Invalid Email or Password';
                    errorAlert.classList.remove('d-none');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Authorize Entry';
                    return;
                }
                
                // Store JWT token
                localStorage.setItem('nova_token', response);
                
                // Decode token to see role for welcome toast
                const base64Url = response.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const claims = JSON.parse(atob(base64));
                
                // Redirect user
                const urlParams = new URLSearchParams(window.location.search);
                const redirectUrl = urlParams.get('redirect');
                
                if (redirectUrl) {
                    window.location.href = decodeURIComponent(redirectUrl);
                } else {
                    if (claims.role === 'ADMIN') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                }
                
            } catch (error) {
                errorAlert.innerText = 'Service temporarily unavailable. Try again later.';
                errorAlert.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Authorize Entry';
            }
        });
    </script>
</body>
</html>
