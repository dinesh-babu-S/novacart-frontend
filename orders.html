<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — NovaCart Vault</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style System -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>

    <!-- Header / Navbar Container -->
    <div id="header-navbar"></div>

    <!-- Main Container -->
    <div class="container" style="margin-top: 130px; min-height: 80vh; max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="h2 text-white m-0"><i class="bi bi-clock-history text-gradient-purple me-2"></i>My Orders</h1>
                <p class="text-secondary small mt-1 mb-0">Review order tracking statuses and receipts</p>
            </div>
            <button class="glow-btn-outline btn-sm" id="refresh-orders-btn"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
        </div>
        
        <!-- Orders list wrapper -->
        <div id="orders-history-list">
            <!-- Skeletons loaded dynamically -->
            <div class="skeleton mb-3" style="height: 100px; width: 100%;"></div>
            <div class="skeleton mb-3" style="height: 100px; width: 100%;"></div>
            <div class="skeleton mb-3" style="height: 100px; width: 100%;"></div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-5 mt-5" style="border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(13, 13, 24, 0.4);">
        <div class="container text-center">
            <p class="text-muted small mb-0">&copy; 2026 NovaCart Inc. Handcrafted Premium Experience.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Dynamic Background -->
    <script src="js/bg-morphism.js"></script>
    
    <!-- Custom JS Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <!-- Custom Page Script -->
    <script src="js/orders.js"></script>
</body>
</html>
