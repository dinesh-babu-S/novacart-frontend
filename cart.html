<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart — NovaCart Vault</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom Style System -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>

    <!-- Header / Navbar Container -->
    <div id="header-navbar"></div>

    <!-- Main Container -->
    <div class="container" style="margin-top: 130px; min-height: 80vh;">
        <h1 class="h2 text-white mb-5"><i class="bi bi-bag-dash text-gradient-purple me-2"></i>Your Shopping Cart</h1>
        
        <div class="row g-5">
            <!-- Items Grid -->
            <div class="col-lg-8">
                <div class="glass-panel p-4" id="cart-page-items-card">
                    <!-- Loaded dynamically -->
                    <div class="skeleton mb-3" style="height: 80px; width: 100%;"></div>
                    <div class="skeleton mb-3" style="height: 80px; width: 100%;"></div>
                </div>
            </div>
            
            <!-- Summary Card -->
            <div class="col-lg-4">
                <div class="glass-panel p-4 sticky-top" style="top: 100px;">
                    <h3 class="h4 text-white mb-4">Summary</h3>
                    
                    <div class="d-flex justify-content-between mb-3 pb-3 border-bottom border-secondary">
                        <span class="text-secondary">Subtotal</span>
                        <span class="text-white" id="cart-page-subtotal">Rs. 0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3 pb-3 border-bottom border-secondary">
                        <span class="text-secondary">Shipping</span>
                        <span class="text-success fw-bold">Complimentary</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="text-white fw-bold">Total Amount</span>
                        <span class="text-gradient-gold h4 m-0" id="cart-page-total">Rs. 0.00</span>
                    </div>
                    
                    <button class="glow-btn w-100 py-3" id="cart-page-checkout-btn">Authorize Vault Purchase</button>
                    <a href="products.html" class="btn btn-outline-secondary w-100 mt-2 text-secondary py-2 border-secondary">Continue Selection</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-5 mt-5" style="border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(13, 13, 24, 0.4);">
        <div class="container text-center">
            <p class="text-muted small mb-0">&copy; 2026 NovaCart Inc. Handcrafted Premium Experience.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Dynamic Background -->
    <script src="js/bg-morphism.js"></script>
    
    <!-- Custom JS Core Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <!-- Custom Page Script -->
    <script src="js/cart.js"></script>
</body>
</html>
